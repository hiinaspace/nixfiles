repos:
  - repo: local
    hooks:
      - id: gitleaks-staged
        name: Gitleaks (staged files)
        entry: .pre-commit-hooks/gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: gitleaks-history
        name: Gitleaks (repository history)
        entry: .pre-commit-hooks/gitleaks git --redact --verbose .
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
